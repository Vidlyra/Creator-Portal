<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Vidlyra Creator Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:#fff;
}

header{

height:75px;
padding:0 8%;

display:flex;
justify-content:space-between;
align-items:center;

background:#111;

border-bottom:1px solid #222;

position:sticky;
top:0;
z-index:999;

}

.logo{

font-size:28px;
font-weight:700;
color:#ff7a00;

}

nav{

display:flex;
gap:15px;

}

nav a{

text-decoration:none;

color:white;

padding:10px 18px;

border-radius:8px;

transition:.3s;

}

nav a:hover{

background:#ff7a00;

}

.container{

width:90%;
max-width:1300px;

margin:40px auto;

}

.welcome{

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:20px;

margin-bottom:35px;

}

.welcome h1{

font-size:38px;

}

.welcome span{

color:#ff7a00;

}

.upload-btn{

background:#ff7a00;

padding:14px 24px;

border-radius:10px;

text-decoration:none;

color:white;

font-weight:600;

}

.stats{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:40px;

}

.card{

background:#111;

border:1px solid #222;

padding:25px;

border-radius:15px;

}

.card h2{

font-size:42px;

color:#ff7a00;

margin-bottom:10px;

}

.projects-title{

margin-bottom:20px;

font-size:28px;

}

.projects{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:25px;

}

.project{

background:#111;

border:1px solid #222;

border-radius:15px;

overflow:hidden;

}

.project img{

width:100%;
height:180px;

object-fit:cover;

}

.content{

padding:20px;

}

.content h3{

margin-bottom:10px;

}

.badge{

display:inline-block;

padding:6px 14px;

border-radius:20px;

background:#ff7a00;

margin-top:15px;

}

.actions{

display:flex;

gap:10px;

margin-top:20px;

}

.actions button{

flex:1;

padding:10px;

border:none;

border-radius:8px;

cursor:pointer;

}

.edit{

background:#2196f3;
color:white;

}

.delete{

background:#ff4444;
color:white;

}

@media(max-width:768px){

header{

flex-direction:column;
height:auto;
padding:20px;

}

nav{

margin-top:15px;
flex-wrap:wrap;
justify-content:center;

}

.welcome{

flex-direction:column;
align-items:flex-start;

}

.welcome h1{

font-size:30px;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

VIDLYRA

</div>

<nav>

<a href="dashboard.html">Dashboard</a>

<a href="upload.html">Upload</a>

<a href="profile.html">Profile</a>

<a href="#" onclick="logout()">Logout</a>

</nav>

</header>

<div class="container">

<div class="welcome">

<div>

<h1>

Welcome,

<span id="creatorName">

Creator

</span>

</h1>

<p>

Manage your creative projects from one place.

</p>

</div>

<a href="upload.html" class="upload-btn">

+ Upload Project

</a>

</div>

<div class="stats">

<div class="card">

<h2 id="totalProjects">0</h2>

<p>Total Projects</p>

</div>

<div class="card">

<h2 id="pendingProjects">0</h2>

<p>Pending</p>

</div>

<div class="card">

<h2 id="approvedProjects">0</h2>

<p>Approved</p>

</div>

<div class="card">

<h2 id="rejectedProjects">0</h2>

<p>Rejected</p>

</div>

</div>

<h2 class="projects-title">

My Projects

</h2>

<div class="projects" id="projectsContainer">

<p>No projects uploaded yet.</p>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>

<script src="js/dashboard.js"></script>

</body>
</html>
